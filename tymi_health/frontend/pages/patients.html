<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Patient - TYMI Health</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">TYMI Health Companion</div>
        <div class="nav-links">
            <a href="../index.html" style="color: white; margin-right: 15px;">Dashboard</a>
            <a href="patients.html" style="color: white;">Add Patient</a>
        </div>
    </nav>

    <div class="container">
        <div class="card" style="max-width: 600px; margin: auto;">
            <h2>Patient Intake Form</h2>
            <form id="patient-form">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" name="name" required>
                </div>
                <div style="display: flex; gap: 10px;">
                    <div class="form-group" style="flex: 1;">
                        <label>Age</label>
                        <input type="number" name="age" required>
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label>Phone</label>
                        <input type="text" name="phone" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Address</label>
                    <textarea name="address" rows="2"></textarea>
                </div>
                <div style="display: flex; gap: 10px;">
                    <div class="form-group" style="flex: 1;">
                        <label>Weight (kg)</label>
                        <input type="number" step="0.1" name="weight">
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label>Height (cm)</label>
                        <input type="number" step="0.1" name="height">
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label>BP (e.g. 120/80)</label>
                        <input type="text" name="bp">
                    </div>
                </div>
                <div class="form-group">
                    <label>Allergies</label>
                    <input type="text" name="allergies">
                </div>
                <div class="form-group">
                    <label>Current Symptoms</label>
                    <textarea name="symptoms" rows="4" required></textarea>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%;">Submit for Triage</button>
            </form>
        </div>
    </div>

    <script src="../config/config.js"></script>
    <script src="../app.js"></script>
    <script>
        document.getElementById('patient-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());
            
            const result = await addPatient(data);
            if (result) {
                alert(`Triage Complete!\nStatus: ${result.status}\nRecommendation: ${result.recommendation}`);
                window.location.href = '../index.html';
            }
        });
    </script>
</body>
</html>
